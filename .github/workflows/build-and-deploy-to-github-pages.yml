name: build-and-deploy-to-github-pages
run-name: ${{ github.actor }} is running the build and deploy to GitHub Pages workflow for the branch ${{  github.ref }}

on:
  workflow_dispatch:
  push:
    branches: main

    paths:
      - '**.cs'
      - '**.csproj'
      - '**.mjs'
      - '**.rs'
      - '**.toml'
      - '**.sln'

permissions:
  pages: write      # Allow writing to GitHub Pages
  contents: write   # Allow modifying repository contents
  id-token: write   # Allow requesting an ID token (needed for deploy-pages action)

defaults:
  run:
    working-directory: ./

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Step
      run: echo "Building on ${{ runner.os }}"

    - name: Install DocFX
      working-directory: ./
      run: dotnet tool install -g docfx

 #   - name: Install .NET MAUI workload
 #     working-directory: ./src/csharp 
 #     run: |
 #       dotnet workload install maui-windows

    - name: Build HTML documentation
      working-directory: ./src/docfx
      run: |
        dir
        build_all.bat

    - name: Setup GitHub Pages
      id: pages
      uses: actions/configure-pages@v3
      with:
        enablement: true

    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: ./src/docfx/_site

  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

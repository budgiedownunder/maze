name: build-and-deploy-to-github-pages
run-name: ${{ github.actor }} is running the build and deploy to GitHub Pages workflow for the branch ${{  github.ref }}

on:
  workflow_dispatch:
  push:
    branches: main

    paths:
      - '**.cs'
      - '**.csproj'
      - '**.mjs'
      - '**.rs'
      - '**.toml'
      - '**.sln'

permissions:
  pages: write      # Allow writing to GitHub Pages
  contents: write   # Allow modifying repository contents
  id-token: write   # Allow requesting an ID token (needed for deploy-pages action)

defaults:
  run:
    working-directory: ./

jobs:
  build:
    runs-on: windows-latest

    env:
      NET_BUILD_SOLUTION: 'Build-Windows.sln'
      NET_MOBILE_FRAMEWORK_INCLUSION: ${{ '-p:ExcludeMobileFrameworks=true' }}

    steps:
    - name: Build Step
      run: echo "Building on ${{ runner.os }}"

    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install wasm-pack on Windows
      uses: jetli/wasm-pack-action@v0.4.0
      with:
        version: 'latest'

    - name: Install DocFX
      working-directory: ./
      run: dotnet tool install -g docfx

    - name: Install Redocly
      working-directory: ./
      run: npm install -g @redocly/cli

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.200 # Match the version in global.json

    - name: Display active NET SDK version (Windows)
      if: runner.os == 'Windows'
      working-directory: ./src/csharp
      continue-on-error: true
      run: |
        dotnet --version
  
    - name: Install Required Workloads (Windows)
      if: runner.os == 'Windows'
      working-directory: ./src/csharp
      run: |
        dotnet workload install maui
        dotnet workload install android
        dotnet workload install maui-windows
  
    - name: Update Workloads (Windows)
      if: runner.os == 'Windows'
      working-directory: ./src/csharp
      run: |
        dotnet workload update
    
    - name: Verify Installed SDKs and Workloads (Windows)
      if: runner.os == 'Windows'
      working-directory: ./src/csharp
      run: |
        dotnet --list-sdks
        dotnet workload list
      
    - name: Build Rust Components
      working-directory: ./src/rust
      run: |
        cargo build --locked --verbose
        cd maze_wasm
        wasm-pack build --target web -- --features "wasm-bindgen"
        cargo build --locked --target wasm32-unknown-unknown --release --no-default-features --features "wasm-lite"
        pwd

    - name: Set environment variables (Windows)
      working-directory: ./src/rust
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        $fullPath = "$($pwd.Path)/target/wasm32-unknown-unknown/release/maze_wasm.wasm"
        "MAZE_WASM_PATH=$fullPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
  
    - name: Restore .NET dependencies
      working-directory: ./src/csharp 
      run: |
        dotnet restore ${{ env.NET_BUILD_SOLUTION }} ${{ env.NET_MOBILE_FRAMEWORK_INCLUSION }} 
  
    - name: Build .NET components
      working-directory: ./src/csharp 
      run: |
        dotnet build ${{ env.NET_BUILD_SOLUTION }} ${{ env.NET_MOBILE_FRAMEWORK_INCLUSION }}
          
    - name: Build HTML documentation
      working-directory: ./src/docfx
      shell: cmd
      run: |
        build_all.bat
       
    - name: Setup GitHub Pages
      id: pages
      uses: actions/configure-pages@v4
      with:
        enablement: true

    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./src/docfx/_site

  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

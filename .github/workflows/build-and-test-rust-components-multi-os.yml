name: build-and-test-rust-components-multi-os
run-name: ${{ github.actor }} is running the build and test workflow for Rust components within the branch ${{  github.ref }} on mutliple operating systems

on:
  push:
    branches:
      
    paths:
      - '**.rs'
      - '**.toml'

defaults:
  run:
    working-directory: ./src/rust

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
     
    - name: Handle Ubuntu-specifics
      if: matrix.os == 'ubuntu-latest'
      run: echo "Running on Ubuntu"
    - name: Handle Mac OS-specifics
      if: matrix.os == 'macos-latest'
      run: echo "Running on Mac OS"
    - name: Handle Windows OS-specifics
      if: matrix.os == 'windows-latest'
      run: echo "Running on Windows OS"
      
    - name: Build
      run: cargo build --verbose
      
    - name: Test
      run: |
        cargo test -p maze
        cargo test -p maze_console -- --test-threads=1 
        cargo test -p storage -- --test-threads=1
        cargo test -p maze_wasm

    - name: Benchmark
      run: |
        cargo bench -p maze

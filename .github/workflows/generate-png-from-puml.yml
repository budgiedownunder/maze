name: generate-png-from-puml
run-name: ${{ github.actor }} is running the generate diagram PNG files from PlantUML within the branch ${{  github.ref }}

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**/*.puml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.puml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install Java and PlantUML
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jdk graphviz
        sudo curl -L https://github.com/plantuml/plantuml/releases/download/v1.2024.6/plantuml.jar -o /usr/local/bin/plantuml.jar

    - name: Generate PNGs
      run: |
        plantuml() {
          java -jar /usr/local/bin/plantuml.jar "$@"
        }      
        plantuml -version
        for f in $(find ./docs/diagrams -maxdepth 1 -name '*.puml'); do
          echo "Processing $f"
          plantuml -tpng "$f"
        done

    - name: Commit PNG files
      if: github.event_name == 'push'
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add docs/diagrams/*.png
        if git diff --cached --quiet; then
          echo "No changes to commit."
        else
          git commit -m "Generate PNG files from PlantUML"
          git push
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Generate PNG from PlantUML

on:
  push:
    paths:
      - '**/*.puml'
  pull_request:
    paths:
      - '**/*.puml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'adopt'
        java-version: '11'

    - name: Install Java and PlantUML
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jdk graphviz
        curl -L https://github.com/plantuml/plantuml/releases/download/v1.2023.3/plantuml.1.2023.3.jar -o /usr/local/bin/plantuml.jar
        alias plantuml='java -jar /usr/local/bin/plantuml.jar'

    - name: Download C4-PlantUML files
      run: |
        mkdir -p diagrams/includes
        curl -o diagrams/includes/C4.puml https://raw.githubusercontent.com/plantuml-stdlib/C4-PlantUML/master/C4.puml
        curl -o diagrams/includes/C4_Container.puml https://raw.githubusercontent.com/plantuml-stdlib/C4-PlantUML/master/C4_Container.puml
        curl -o diagrams/includes/C4_Context.puml https://raw.githubusercontent.com/plantuml-stdlib/C4-PlantUML/master/C4_Context.puml

    - name: Show .puml C4 include file
      run: cat diagrams/includes/C4.puml

    - name: Show .puml C4 Container include file
      run: cat diagrams/includes/C4_Container.puml

    - name: Show .puml C4 Context include file
      run: cat diagrams/includes/C4_Context.puml

    - name: Show .puml files
      run: cat diagrams/maze.puml

    - name: Generate PNGs
      run: |
        for f in $(find . -name '*.puml' -not -path './diagrams/includes/*' -not -path './diagrams/includes'); do
          echo "Processing $f"
          plantuml -verbose -DRELATIVE_INCLUDE=true -tpng "$f"
        done

    - name: Commit PNG files
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add diagrams/*.png
        git commit -m "Generate PNG files from PlantUML"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
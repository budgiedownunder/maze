name: build-and-test-components-multi-os
run-name: ${{ github.actor }} is running the build and test workflow for all components within the branch ${{  github.ref }} on multiple operating systems

on:
  push:
    branches:

    paths:
      - '**.cs'
      - '**.csproj'
      - '**.mjs'
      - '**.rs'
      - '**.toml'
      - '**.sln'

defaults:
  run:
    working-directory: ./

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: 
          - ubuntu-latest
  #        - macos-latest
  #        - windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Handle Ubuntu-specifics
      if: matrix.os == 'ubuntu-latest'
      run: echo "Running on Ubuntu"
    - name: Handle Mac OS-specifics
      if: matrix.os == 'macos-latest'
      run: echo "Running on Mac OS"
    - name: Handle Windows OS-specifics
      if: matrix.os == 'windows-latest'
      run: echo "Running on Windows OS"

    - name: Install wasm-pack on Linux/macOS
      if: runner.os != 'Windows'
      run: |
        curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    - name: Install wasm-pack on Windows
      if: runner.os == 'Windows'
      uses: jetli/wasm-pack-action@v0.4.0
      with:
        version: 'latest'
    
    - name: Install DocFX
      working-directory: ./
      run: dotnet tool install -g docfx

    - name: Build HTML documentation (Windows)
      if: runner.os == 'Windows'
      working-directory: ./src/docfx
      shell: cmd
      run: |
        build_all.bat

    - name: Build HTML documentation (non-Windows)
      if: runner.os != 'Windows'
      working-directory: ./src/docfx
      run: |
        sh build_all.sh

    - name: Setup GitHub Pages
      if: startsWith(runner.os, 'Linux') && github.ref == 'refs/heads/main'
      id: pages
      uses: actions/configure-pages@v3

    - name: Upload GitHub Pages artifact
      if: startsWith(runner.os, 'Linux') && github.ref == 'refs/heads/main'
      uses: actions/upload-pages-artifact@v2
      with:
        path: ./src/docfx/_site
  
    - name: Build Rust Components
      working-directory: ./src/rust
      run: |
        cargo build --verbose
        cd maze_wasm
        wasm-pack build --target web --features "wasm-bindgen"
        cargo build --target wasm32-unknown-unknown --release
        pwd

    - name: Set environment variables (non-Windows)
      if: runner.os != 'Windows'
      working-directory: ./src/rust
      run: |
        echo "MAZE_WASM_PATH=$(pwd)/target/wasm32-unknown-unknown/release/maze_wasm.wasm" >> $GITHUB_ENV
  
    - name: Set environment variables (Windows)
      working-directory: ./src/rust
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        $fullPath = "$($pwd.Path)/target/wasm32-unknown-unknown/release/maze_wasm.wasm"
        "MAZE_WASM_PATH=$fullPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Run Rust Component Tests
      working-directory: ./src/rust 
      run: |
        cargo test -p maze
        cargo test -p maze_console -- --test-threads=1
        cargo test -p storage -- --test-threads=1
        cargo test -p maze_wasm

    - name: Run Rust JavaScript API Tests
      working-directory: ./src/rust 
      run: |
        cd maze_wasm/tests/js
        npm install
        npm run test_api
        npm run test_help_examples

    - name: Run Rust Benchmark Tests
      working-directory: ./src/rust 
      run: |
        cargo bench -p maze

    - name: Setup .NET build environment
      working-directory: ./src/csharp 
      run: |
        dotnet restore
  
    - name: Build .NET components
      working-directory: ./src/csharp 
      run: |
        dotnet build

    - name: Test .NET components
      working-directory: ./src/csharp 
      run: |
        dotnet test

  deploy-to-github-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    if: github.ref == 'refs/heads/main'
    needs: build-and-test
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
        with:
          branch: main
          enablement: true
name: build-and-test-components-multi-os
run-name: ${{ github.actor }} is running the build and test workflow for all components within the branch ${{  github.ref }} on multiple operating systems

on:
  workflow_dispatch:
  push:
    branches:

    paths:
      - '**.cs'
      - '**.csproj'
      - '**.mjs'
      - '**.rs'
      - '**.toml'
      - '**.sln'

defaults:
  run:
    working-directory: ./

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: 
   #       - ubuntu-latest
   #       - macos-latest
          - windows-latest

    env:
      NET_BUILD_SOLUTION: ${{ matrix.os == 'windows-latest' && 'Build-Windows.sln' || 'Build-Non-Windows.sln' }}
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Handle Ubuntu-specifics
      if: matrix.os == 'ubuntu-latest'
      run: echo "Running on Ubuntu"
    - name: Handle Mac OS-specifics
      if: matrix.os == 'macos-latest'
      run: echo "Running on Mac OS"
    - name: Handle Windows OS-specifics
      if: matrix.os == 'windows-latest'
      run: echo "Running on Windows OS"

    - name: Install wasm-pack on Linux/macOS
      if: runner.os != 'Windows'
      run: |
        curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    - name: Install wasm-pack on Windows
      if: runner.os == 'Windows'
      uses: jetli/wasm-pack-action@v0.4.0
      with:
        version: 'latest'
    
    - name: Install DocFX
      working-directory: ./
      run: dotnet tool install -g docfx
  
    - name: Install .NET MAUI workload for Windows
      if: runner.os == 'Windows'
      working-directory: ./src/csharp 
      run: |
        dotnet workload install maui-windows

    - name: Restore .NET dependencies
      working-directory: ./src/csharp 
      run: |
        dotnet restore ${{ env.NET_BUILD_SOLUTION }}
  
    - name: Build .NET components
      working-directory: ./src/csharp 
      run: |
        dotnet build ${{ env.NET_BUILD_SOLUTION }}
  

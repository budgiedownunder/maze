name: build-and-test-components-multi-os
run-name: ${{ github.actor }} is running the build and test workflow for all components within the branch ${{  github.ref }} on multiple operating systems

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - '**.props'
      - '**.xaml'
      - '**.rs'
      - '**.toml'
      - '**.js'
      - '**.mjs'
      - '**.ts'
      - '**.tsx'
      - '**.html'
      - '**.css'

  pull_request:
    branches: [main]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - '**.props'
      - '**.xaml'
      - '**.rs'
      - '**.toml'
      - '**.js'
      - '**.mjs'
      - '**.ts'
      - '**.tsx'
      - '**.html'
      - '**.css'

defaults:
  run:
    working-directory: ./

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: 
          - ubuntu-latest
          - macos-latest
          - windows-latest

    env:
      NET_BUILD_SOLUTION: ${{ matrix.os == 'windows-latest' && 'Build-Windows.sln' || 'Build-Non-Windows.sln' }}
      NET_MOBILE_FRAMEWORK_INCLUSION: ${{ matrix.os == 'windows-latest' && '-p:ExcludeMobileFrameworks=true' || '-p:ExcludeMobileFrameworks=true' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Handle Ubuntu-specifics
      if: matrix.os == 'ubuntu-latest'
      run: echo "Running on Ubuntu"

    - name: Handle Mac OS-specifics
      if: matrix.os == 'macos-latest'
      run: echo "Running on Mac OS"

    - name: Handle Windows OS-specifics
      if: matrix.os == 'windows-latest'
      run: echo "Running on Windows OS"

    - name: Install wasm-pack on Linux/macOS
      if: runner.os != 'Windows'
      run: |
        curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    - name: Install wasm-pack on Windows
      if: runner.os == 'Windows'
      uses: jetli/wasm-pack-action@v0.4.0
      with:
        version: 'latest'
    
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'

    - name: Install DocFX
      working-directory: ./
      run: dotnet tool install -g docfx
  
    - name: Install Redocly
      if: runner.os == 'Windows'
      working-directory: ./
      run: npm install -g @redocly/cli

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.200 # Match the version in global.json

    - name: Display active NET SDK version (Windows)
      if: runner.os == 'Windows'
      working-directory: ./src/csharp
      continue-on-error: true
      run: |
        dotnet --version
          
    - name: Install Required Workloads (Windows)
      if: runner.os == 'Windows'
      working-directory: ./src/csharp
      run: |
        dotnet workload install maui
        dotnet workload install android
        dotnet workload install maui-windows

    - name: Update Workloads (Windows)
      if: runner.os == 'Windows'
      working-directory: ./src/csharp
      run: |
        dotnet workload update
  
    - name: Verify Installed SDKs and Workloads (Windows)
      if: runner.os == 'Windows'
      working-directory: ./src/csharp
      run: |
        dotnet --list-sdks
        dotnet workload list

    - name: Build Rust Components
      working-directory: ./src/rust
      run: |
        cargo build --locked --verbose
        cd maze_wasm
        wasm-pack build --target web -- --features "wasm-bindgen"
        cargo build --locked --target wasm32-unknown-unknown --release --no-default-features --features "wasm-lite"
        pwd

    - name: Set environment variables (non-Windows)
      if: runner.os != 'Windows'
      working-directory: ./src/rust
      run: |
        echo "MAZE_WASM_PATH=$(pwd)/target/wasm32-unknown-unknown/release/maze_wasm.wasm" >> $GITHUB_ENV
  
    - name: Set environment variables (Windows)
      working-directory: ./src/rust
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        $fullPath = "$($pwd.Path)/target/wasm32-unknown-unknown/release/maze_wasm.wasm"
        "MAZE_WASM_PATH=$fullPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Run Rust Component Tests
      working-directory: ./src/rust 
      run: |
        cargo test --locked -p auth
        cargo test --locked -p data_model
        cargo test --locked -p maze --features generation
        cargo test --locked -p maze_c -- --test-threads=1
        cargo test --locked -p maze_console -- --test-threads=1
        cargo test --locked -p storage -- --test-threads=1
        cargo test --locked -p maze_wasm
        cargo test --locked -p maze_web_server
        cargo test --locked -p maze_openapi_generator
        cargo test --locked -p utils

    - name: Run Rust JavaScript API Tests
      working-directory: ./src/rust 
      run: |
        cd maze_wasm/tests/js
        npm install
        npm run test_api
        npm run test_help_examples

    - name: Run Rust Benchmark Tests
      working-directory: ./src/rust 
      run: |
        cargo bench --locked -p maze

    - name: Restore .NET dependencies
      working-directory: ./src/csharp 
      run: |
        dotnet restore ${{ env.NET_BUILD_SOLUTION }} ${{ env.NET_MOBILE_FRAMEWORK_INCLUSION }} 
  
    - name: Build .NET components
      working-directory: ./src/csharp 
      run: |
        dotnet build ${{ env.NET_BUILD_SOLUTION }} ${{ env.NET_MOBILE_FRAMEWORK_INCLUSION }}

    - name: Test .NET components
      working-directory: ./src/csharp 
      run: |
        dotnet test ${{ env.NET_BUILD_SOLUTION }} ${{ env.NET_MOBILE_FRAMEWORK_INCLUSION }}

    - name: Install React dependencies
      working-directory: ./src/react/maze_web_server
      run: npm ci

    - name: Run React unit tests
      working-directory: ./src/react/maze_web_server
      run: npm test

    - name: Install Playwright browser
      working-directory: ./src/react/maze_web_server
      run: npx playwright install chromium --with-deps

    - name: Run React E2E tests
      working-directory: ./src/react/maze_web_server
      run: npx playwright test

    - name: Build HTML documentation (Windows)
      if: runner.os == 'Windows'
      working-directory: ./src/docfx
      shell: cmd
      run: |
        build_all.bat

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze WebAssembly</title>
</head>

<body>
    <h1>Maze Row Count Example</h1>
    <script type="module">
        import init, { MazeWasm, MazeCellType } from '../pkg/maze_wasm.js';


        async function run() {
            // Initialize the Wasm module
            await init();

            let maze = new MazeWasm();
            try {
                maze.from_json(`{
                    \"name\":\"test\", 
                    \"definition\": {
                        \"grid\":[
                            [\"S\", \"W\", \" \", \" \", \"W\"],
                            [\" \", \"W\", \" \", \"W\", \" \"],
                            [\" \", \" \", \" \", \"W\", \"F\"],
                            [\"W\", \" \", \"W\", \" \", \" \"],
                            [\" \", \" \", \" \", \"W\", \" \"],
                            [\"W\", \"W\", \" \", \" \", \" \"],
                            [\"W\", \"W\", \" \", \"W\", \" \"]
                        ]
                }}`);
                let solution = maze.solve();
                let solution_points = solution.get_path_points();
                console.log("Successfully solved maze. Solution points are: ", solution_points);            
            } catch (e) {
                console.error("Operation failed: ", e);
            }
        }

        run();
    </script>
</body>

</html>

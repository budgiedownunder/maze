# Application Configuration File

# Server port to listen on (default: 8443)
port = 8443

# Path to the built React app dist directory (relative to the server working directory,
# or absolute). For local development with the React app, set to:
#   ../../react/maze_web_server/dist
# If the directory does not exist, the server runs as API-only (no frontend served).
#static_dir = "static"
static_dir = "../../react/maze_web_server/dist"

[security]
# Path to TLS certificate file (default: "cert.pem")
cert_file = "C:/Certs/maze.cbintex.com-crt.pem"
#cert_file = "cert.pem"

# Path to TLS private key file (default: "key.pem")
key_file = "C:/Certs/maze.cbintex.com-key-pkcs8.pem"
#key_file = "key.pem"
# Login token expiry in hours (integer).
login_expiry_hours = 24

[security.password_hash]
# Argon2 memory cost in KiB (default: 65536 = 64 MiB)
# Higher values increase protection against brute-force attacks
#mem_cost = 65536

# Argon2 time cost (iterations) (default: 3)
# Higher values increase CPU usage
time_cost = 3

# Argon2 degree of parallelism (default: 4)
# Should match the number of CPU cores
lanes = 4

# Desired length of password hash output in bytes (default: 32)
# Common values: 32 (256-bit), 64 (512-bit)
hash_length = 32

[logging]
# Directory to write log files to (default: "logs")
# Relative to the server working directory
log_dir = "logs"

# Minimum log level to capture (default: "info")
# Valid values: error, warn, info, debug, trace
log_level = "info"

# Prefix used verbatim at the start of each log file name, including any separator.
# Log files are named {log_file_prefix}{YYYY-MM-DD}.log
# e.g. "maze_web_server_" produces "maze_web_server_2026-04-09.log"
log_file_prefix = "maze_web_server_"

[features]
# Whether new users can self-register via the signup endpoint (default: true).
# Can also be changed at runtime via PUT /api/v1/admin/features (admin only).
allow_signup = true

[oauth]
# Master switch for OAuth sign-in. When false, no OAuth buttons are shown in
# the front ends and no validation runs against the connector's section below.
enabled = false
# Which OAuthConnector implementation to use. "internal" speaks OAuth/OIDC
# directly to each provider; "auth0" is reserved for a future drop-in.
connector = "internal"
# URL scheme the MAUI app uses as its OAuth redirect target. The MAUI client
# must register this scheme in each platform's manifest.
mobile_redirect_scheme = "maze-app"

# ---- Internal connector: speaks OAuth/OIDC directly to each provider ----
# Client secrets are never stored here. Set the env var named in
# client_secret_env instead (e.g. MAZE_OAUTH_GOOGLE_SECRET).
[oauth.internal.providers.google]
enabled = false
display_name = "Google"
client_id = ""
client_secret_env = "MAZE_OAUTH_GOOGLE_SECRET"
redirect_uri = "https://maze.cbintex.com:8443/api/v1/auth/oauth/google/callback"

[oauth.internal.providers.github]
enabled = false
display_name = "GitHub"
client_id = ""
client_secret_env = "MAZE_OAUTH_GITHUB_SECRET"
redirect_uri = "https://maze.cbintex.com:8443/api/v1/auth/oauth/github/callback"


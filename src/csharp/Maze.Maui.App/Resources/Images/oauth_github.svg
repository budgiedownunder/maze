<!--
  GitHub Octocat mark, light-mode variant (dark fill). Source path data from
  https://github.com/logos. Identical to the React <GitHubIcon /> in
  src/react/maze_web_server/src/components/OAuthButtons.tsx; the React
  version uses fill="currentColor" but MAUI's SVG-to-bitmap pipeline
  rasterises at build time and cannot do that, so we ship a paired light /
  dark asset and pick between them in OAuthProviderIconConverter:
    - oauth_github.svg       → fill #181717 (this file, light-mode bg)
    - oauth_github_dark.svg  → fill #FFFFFF (dark-mode bg)
-->

<!--
  Official Google "G" mark, multi-colour. Per Google's brand guidelines
  (https://developers.google.com/identity/branding-guidelines) the colours
  must remain as supplied — do NOT recolour, re-tint, or apply
  IconTintColorBehavior to this file. Path data is identical to the React
  <GoogleIcon /> in src/react/maze_web_server/src/components/OAuthButtons.tsx
  for visual parity across the two clients.
-->
<!--
  Width/height declared at 24×24 to match oauth_github.svg's base size — MAUI's
  MauiImage pipeline rasterises at the declared dimensions, so mismatched
  width/height between provider icons makes one button's icon visually larger
  than the other's. The viewBox stays at 48×48 so the original path data
  still scales correctly.
-->
